steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/the-briteside', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/the-briteside']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'the-briteside'
      - '--image'
      - 'gcr.io/$PROJECT_ID/the-briteside'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY},SENDGRID_API_KEY=${_SENDGRID_API_KEY},SENDGRID_FROM_EMAIL=${_SENDGRID_FROM_EMAIL},SENDGRID_FROM_NAME=${_SENDGRID_FROM_NAME},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET},FLASK_SECRET_KEY=${_FLASK_SECRET_KEY},SLACK_WEBHOOK_URL=${_SLACK_WEBHOOK_URL},JOB_SECRET=${_JOB_SECRET},EDITOR_EMAILS=${_EDITOR_EMAILS},GCS_MEDIA_BUCKET=${_GCS_MEDIA_BUCKET},DEV_AUTH_MODE=false'

images:
  - 'gcr.io/$PROJECT_ID/the-briteside'

# New substitutions default to empty so the build still succeeds before they are
# configured on the trigger; set real values on the Cloud Build trigger.
substitutions:
  _SLACK_WEBHOOK_URL: ""
  _JOB_SECRET: ""
  _EDITOR_EMAILS: ""
  _GCS_MEDIA_BUCKET: ""

options:
  logging: CLOUD_LOGGING_ONLY
  # Lets the pre-existing trigger-defined substitutions (_ANTHROPIC_API_KEY, etc.)
  # resolve without being redeclared in this file.
  substitution_option: 'ALLOW_LOOSE'
